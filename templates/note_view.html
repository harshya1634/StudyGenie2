{% extends "base.html" %}
{% block title %}{{ note.title }} — StudyGenie{% endblock %}

{% block content %}
  <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
    <div>
      <h2 class="fw-bold mb-0">{{ note.title }}</h2>
      <div class="text-muted">
        {% if note.tags %}Tags: {{ note.tags }}{% else %}No tags{% endif %}
      </div>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary" href="{{ url_for('dashboard') }}">Back</a>
      <a class="btn btn-outline-primary" href="{{ url_for('note_edit', note_id=note._id) }}">Edit</a>
      <a class="btn btn-success" href="{{ url_for('note_pdf', note_id=note._id) }}">Download PDF</a>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <pre class="note-pre mb-0">{{ note.content }}</pre>
    </div>
    <div class="card-footer bg-transparent border-0 p-3 d-flex">
      <form method="post" action="{{ url_for('note_delete', note_id=note._id) }}" onsubmit="return confirm('Delete this note?');">
        <button class="btn btn-outline-danger" type="submit">Delete</button>
      </form>
      <a class="btn btn-outline-secondary ms-auto" href="{{ url_for('dashboard') }}">Done</a>
    </div>
  </div>
{% endblock %}
