{% extends "base.html" %}
{% block title %}Sign in — StudyGenie{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
      <div class="card shadow-sm border-0 p-4">
        <h2 class="fw-bold mb-1">Welcome back</h2>
        <p class="text-muted mb-4">Sign in to access your notes.</p>

        <form method="post" action="{{ url_for('signin_post') }}">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input name="email" type="email" class="form-control" placeholder="you@example.com" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input name="password" type="password" class="form-control" required />
          </div>
          <button class="btn btn-primary w-100" type="submit">Sign in</button>
        </form>

        <div class="text-center mt-3">
          <span class="text-muted">New here?</span>
          <a href="{{ url_for('signup') }}">Create an account</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
