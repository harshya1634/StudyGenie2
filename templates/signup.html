{% extends "base.html" %}
{% block title %}Create account — StudyGenie{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
      <div class="card shadow-sm border-0 p-4">
        <h2 class="fw-bold mb-1">Create your account</h2>
        <p class="text-muted mb-4">Start saving notes and exporting PDFs.</p>

        <form method="post" action="{{ url_for('signup_post') }}">
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input name="name" class="form-control" placeholder="Your name" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input name="email" type="email" class="form-control" placeholder="you@example.com" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input name="password" type="password" class="form-control" minlength="6" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm password</label>
            <input name="confirm" type="password" class="form-control" minlength="6" required />
          </div>
          <button class="btn btn-primary w-100" type="submit">Create account</button>
        </form>

        <div class="text-center mt-3">
          <span class="text-muted">Already have an account?</span>
          <a href="{{ url_for('signin') }}">Sign in</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
